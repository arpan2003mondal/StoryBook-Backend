spring.application.name=${APP_NAME:StoryBook}
server.port=${APP_PORT:1234}

# =============================================
# DATABASE CONFIGURATION
# =============================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:storybookdb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update

spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Disable default Spring Security user generation
spring.security.user.name=${SPRING_SECURITY_USERNAME}
spring.security.user.password=${SPRING_SECURITY_PASSWORD}

# =============================================
# MAIL CONFIGURATION (FOR OTP)
# =============================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=${MAIL_FROM:noreply@storybook.com}
app.name=${APP_NAME:StoryBook}

# =============================================
# OTP CONFIGURATION
# =============================================
otp.expiry.minutes=${OTP_EXPIRY_MINUTES:10}

# Enable debug logging for troubleshooting
# logging.level.org.springframework=DEBUG
# logging.level.com.company.storybook=DEBUG
logging.level.com.company.storybook.service.UserAuthServiceImpl=INFO
logging.level.com.company.storybook.service.EmailService=INFO
logging.level.org.springframework.mail=DEBUG

